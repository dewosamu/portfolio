<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Art Portfolio</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@200..700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: "Oswald", sans-serif;
            background-color: black;
            color: white;
            margin: 0;
            padding: 0;
        }

        .container {
            max-width: 1500px;
            margin: 0 auto;
        }

        /* FIXED: Evenly spaced buttons */
        .main-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 30px 20px;
        }

        .nav-btn {
            color: rgb(147, 0, 0);
            text-decoration: none;
            padding: 10px 20px;
            font-size: 24px;
            transition: 0.3s;
            text-transform: uppercase;
        }

        /* FIXED: Active and Hover states */
        .nav-btn:hover, .nav-btn.active {
            background: red;
            color: black;
        }

        .gallery {
            column-count: 2;
            column-gap: 0;
            line-height: 0; /* FIXED: Removes ghost spacing */
        }

        .gallery img, .hero-img {
            width: 100%;
            display: block;
            margin: 0;
            padding: 0;
        }

        .gallery img:hover {
            opacity: 0.7;
        }

        .footer-text {
            font-size: 64px;
            font-weight: bold;
            text-align: center;
            padding: 60px 0;
            text-transform: uppercase;
        }

        @media (max-width: 800px) {
            .gallery {
                column-count: 1;
            }
            .main-header {
                flex-wrap: wrap;
                justify-content: center;
                gap: 10px;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <header class="main-header">

        <a href="projects.html" class="nav-btn">PROJECTS</a>

        <a href="contacts.html" class="nav-btn">CONTACTS</a>
    </header>
